name: Library Checks
permissions:
  contents: read
on:
  pull_request:
  push:
    branches:
      - main
  merge_group:

jobs:
  build-type-and-test:
    name: Build Type and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --immutable
      - name: Cache for Turbo
        uses: rharkor/caching-for-turbo@v2.5.0
        with:
          cache-prefix: turbo-cache-
      - name: Build Types
        run: yarn build:type

  build-dist:
    name: Build Dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --immutable
      - name: Cache for Turbo
        uses: rharkor/caching-for-turbo@v2.5.0
        with:
          cache-prefix: turbo-cache-
      - name: Build Dist
        run: yarn build

  format:
    name: Format
    runs-on: ubuntu-latest
    needs: build-type-and-test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --immutable
      - name: Cache for Turbo
        uses: rharkor/caching-for-turbo@v2.5.0
        with:
          cache-prefix: turbo-cache-
      - name: Build Types
        run: yarn build:type
      - name: Check Formatting
        run: yarn biome ci --reporter=github

  test-type-unit-and-integration-test:
    name: Typecheck Tests
    runs-on: ubuntu-latest
    needs: build-type-and-test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --immutable
      - name: Cache for Turbo
        uses: rharkor/caching-for-turbo@v2.5.0
        with:
          cache-prefix: turbo-cache-
      - name: Test Type Test
        run: yarn test:test-type

  unit-tests:
    name: Unit Tests
    needs: [build-dist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --immutable
      - name: Cache for Turbo
        uses: rharkor/caching-for-turbo@v2.5.0
        with:
          cache-prefix: turbo-cache-
      - run: yarn test:unit
      - name: Collect and upload the coverage report
        uses: codecov/codecov-action@v7
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  unit-tests-deno:
    name: Deno Unit Tests
    needs: [build-dist, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: yarn
      - uses: denoland/setup-deno@v2
        with:
          deno-version: 'v2.9.x'
      - run: yarn install --immutable
      - name: Cache for Turbo
        uses: rharkor/caching-for-turbo@v2.5.0
        with:
          cache-prefix: turbo-cache-
      - run: yarn test:deno-unit

  unit-tests-bun:
    name: Bun Unit Tests
    needs: [build-dist, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: yarn
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - run: yarn install --immutable
      - name: Cache for Turbo
        uses: rharkor/caching-for-turbo@v2.5.0
        with:
          cache-prefix: turbo-cache-
      - run: yarn test:bun-unit

  integration-tests:
    name: Integration Tests
    needs: [build-dist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --immutable
      - name: Cache for Turbo
        uses: rharkor/caching-for-turbo@v2.5.0
        with:
          cache-prefix: turbo-cache-
      - run: yarn test:integration
      - name: Collect and upload the coverage report
        uses: codecov/codecov-action@v7
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e-tests:
    name: E2E Tests
    needs: [build-dist]
    runs-on: ubuntu-latest
    concurrency:
      group: e2e-tests
      queue: max
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --immutable
      - name: Cache for Turbo
        uses: rharkor/caching-for-turbo@v2.5.0
        with:
          cache-prefix: turbo-cache-
      - run: yarn test:e2e
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          E2E_TEST_GUILD_ID: ${{ secrets.UNIT_TEST_GUILD_ID }}
      - name: Collect and upload the coverage report
        uses: codecov/codecov-action@v7
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
